<!-- Stage 4: Interpret — Results Review (Quadrant-based) -->

<style>

  display: inline-block;
  padding: 0.05rem 0.4rem;
  border-radius: 3px;

  display: inline-block;
  width: 80px;
  height: 6px;
  border-radius: 3px;

/* Expandable criterion rows */
.metric-row { cursor: pointer; transition: background 0.1s; }

</style>

<!-- Section 1: Quadrant Performance -->
<div class="section">
  <div class="section-header flex-between">
    <span data-tooltip="Actual pass rate of each criterion, grouped by quadrant. Quadrant tells you where effort matters most — a Guardrails failure is more urgent than a Deprioritize failure at the same pass rate.">Quadrant Performance</span>

  </div>
  <div class="section-body">
    <div class="quadrant-summary-cards" id="quadrant-summary-cards"></div>
  </div>

    <table>
      <thead>
        <tr>
          <th style="width:85px">Quadrant</th>
          <th style="width:40%">Criterion (The agent should...)</th>

</div>

<div class="section">

    <span class="text-sm text-muted" id="failure-count"></span>
  </div>
  <div class="section-body" style="padding:0;overflow-x:auto;">
    <table>

        <tr>
          <th style="width:85px">Quadrant</th>

<script>
const QUADRANTS_ORDER = ["critical", "valuable", "guardrails", "deprioritize"];
const QUADRANT_LABELS = {
  critical: "Critical",
  valuable: "Valuable",
  guardrails: "Guardrails",
  deprioritize: "Deprioritize",
};
const Q_BADGE_CSS = {
  critical: "q-badge-sm-critical",
  valuable: "q-badge-sm-valuable",
  guardrails: "q-badge-sm-guardrails",
  deprioritize: "q-badge-sm-deprioritize",
};
const Q_CARD_CSS = {
  critical: "qsc-critical",
  valuable: "qsc-valuable",
  guardrails: "qsc-guardrails",
  deprioritize: "qsc-deprioritize",
};
const ROOT_CAUSES = ["eval_setup", "agent_config", "platform_limitation"];
const ROOT_CAUSE_LABELS = {eval_setup: "Eval Setup Issue", agent_config: "Agent Config Issue", platform_limitation: "Platform Limitation"};

let evalResults = [];

function zoneToQuadrant(zone) {
  const z = String(zone || "");
  if (z === "1") return "critical";
  if (z === "2") return "valuable";
  if (z === "3") return "deprioritize";
  return "valuable";
}

function normalizeCriterionMetric(raw) {
  return {
    criterion_id: raw.criterion_id || raw.scenario_id || raw.id,
    statement: raw.statement || raw.name || "",
    quadrant: raw.quadrant || zoneToQuadrant(raw.zone),
    quality_dimension: raw.quality_dimension || "",
    actual_pass_rate: raw.actual_pass_rate || 0,
    cases_total: raw.cases_total || 0,
    cases_passed: raw.cases_passed || 0,
  };
}

function normalizeEvalResult(raw) {
  return {
    ...raw,
    criterion_id: raw.criterion_id || raw.scenario_id || raw.id,
  };
}

function normalizeFailure(raw) {
  return {
    ...raw,
    criterion_id: raw.criterion_id || raw.scenario_id,
    criterion_statement: raw.criterion_statement || raw.scenario_name || raw.name || "",
    quadrant: raw.quadrant || zoneToQuadrant(raw.zone),
  };
}

function rateClass(rate) {
  if (rate >= 90) return "rate-high";
  if (rate >= 70) return "rate-mid";
  return "rate-low";
}

function stageInit() {
  const d = EMBEDDED_DATA.data;
  evalResults = (d.eval_results || []).map(normalizeEvalResult);
  const metrics = (d.criterion_metrics || d.success_metrics || []).map(normalizeCriterionMetric);
  const failures = (d.failures || []).map(normalizeFailure);
  renderMetricsStatus(metrics);
  renderFailures(failures);
  renderActions(d.top_actions || []);
  renderPatterns(d.patterns || []);
}

function renderMetricsStatus(metrics) {
  // Quadrant summary cards
  const cardContainer = document.getElementById("quadrant-summary-cards");
  const stats = {};
  metrics.forEach(m => {
    const q = m.quadrant;
    if (!stats[q]) stats[q] = {criteria: 0, cases_total: 0, cases_passed: 0};
    stats[q].criteria++;
    stats[q].cases_total += m.cases_total;
    stats[q].cases_passed += m.cases_passed;
  });

  let cardsHtml = "";
  QUADRANTS_ORDER.forEach(q => {
    const s = stats[q];
    if (!s) return;
    const pct = s.cases_total > 0 ? Math.round(s.cases_passed / s.cases_total * 100) : 0;
    cardsHtml +=
      '<div class="quadrant-summary-card ' + Q_CARD_CSS[q] + '">' +
      '<div class="qsc-label">' + QUADRANT_LABELS[q] + '</div>' +
      '<div class="qsc-stat">' + pct + '%</div>' +
      '<div class="qsc-detail">' + s.cases_passed + '/' + s.cases_total + ' cases (' + s.criteria + ' criteria)</div>' +
      '</div>';
  });
  cardContainer.innerHTML = cardsHtml;

  // Metrics table — sorted by quadrant importance, then by lowest pass rate first
  const QUADRANT_SORT = { critical: 0, guardrails: 1, valuable: 2, deprioritize: 3 };
  const sorted = [...metrics].sort((a, b) => {
    const qd = QUADRANT_SORT[a.quadrant] - QUADRANT_SORT[b.quadrant];
    if (qd !== 0) return qd;
    return a.actual_pass_rate - b.actual_pass_rate;
  });

  const tbody = document.getElementById("metrics-tbody");
  tbody.innerHTML = "";
  let totalCases = 0;
  let totalPassed = 0;
  sorted.forEach((m, idx) => {
    totalCases += m.cases_total;
    totalPassed += m.cases_passed;
    const barColor = m.actual_pass_rate >= 90 ? "var(--green)" : m.actual_pass_rate >= 70 ? "var(--yellow)" : "var(--red)";
    const criterionCases = evalResults.filter(r => r.criterion_id === m.criterion_id);
    const hasDetails = criterionCases.length > 0;
    const rowId = "metric-detail-" + idx;

    const tr = document.createElement("tr");
    tr.className = "metric-row";
    if (hasDetails) tr.onclick = function() { toggleDetail(rowId, this); };
    tr.innerHTML =
      '<td><span class="q-badge-sm ' + (Q_BADGE_CSS[m.quadrant] || "") + '">' + (QUADRANT_LABELS[m.quadrant] || "") + '</span></td>' +
      '<td class="text-sm" style="font-weight:500;">' + (hasDetails ? '<span class="expand-icon">&#x25B6;</span>' : '<span style="width:1em;display:inline-block;"></span>') + escapeHtml(m.statement || "") + '</td>' +
      '<td class="text-sm">' + escapeHtml(m.quality_dimension || "") + '</td>' +
      '<td class="text-sm" style="text-align:right;font-family:var(--mono);"><span class="' + rateClass(m.actual_pass_rate) + '">' + m.actual_pass_rate + '%</span></td>' +
      '<td><span class="metric-bar-bg"><span class="metric-bar-fill" style="width:' + Math.min(100, m.actual_pass_rate) + '%;background:' + barColor + ';"></span></span>' +
      ' <span class="text-sm text-muted">' + m.cases_passed + '/' + m.cases_total + '</span></td>';
    tbody.appendChild(tr);

    if (hasDetails) {
      const detailTr = document.createElement("tr");
      detailTr.className = "metric-detail-row";
      detailTr.id = rowId;
      let detailHtml = '<td colspan="5"><table class="detail-table"><thead><tr>' +
        '<th style="width:22%">Question</th>' +
        '<th style="width:22%">Expected Response</th>' +
        '<th style="width:22%">Actual Response</th>' +
        '<th style="width:70px">Method</th>' +
        '<th style="width:45px">Score</th>' +
        '<th style="width:40px">Result</th>' +
        '<th style="width:90px">Human Judgement</th>' +
        '</tr></thead><tbody>';
      criterionCases.forEach((c, cIdx) => {
        const caseKey = m.criterion_id + "_" + cIdx;
        detailHtml += '<tr>' +
          '<td>' + escapeHtml(c.question || "") + '</td>' +
          '<td>' + escapeHtml(truncate(c.expected || "", 150)) + '</td>' +
          '<td>' + escapeHtml(truncate(c.actual || "", 150)) + '</td>' +
          '<td>' + escapeHtml(c.method || "") + '</td>' +
          '<td class="detail-score">' + (c.score !== undefined ? c.score.toFixed(2) : "—") + '</td>' +
          '<td>' + (c.pass ? '<span class="detail-pass">Pass</span>' : '<span class="detail-fail">Fail</span>') + '</td>' +
          '<td><select class="judgement-select" data-case-key="' + caseKey + '" data-criterion-id="' + m.criterion_id + '" data-question="' + escapeAttr(c.question || "") + '" data-expected="' + escapeAttr(truncate(c.expected || "", 100)) + '" data-actual="' + escapeAttr(truncate(c.actual || "", 100)) + '" data-quadrant="' + m.quadrant + '" data-criterion-statement="' + escapeAttr(m.statement || "") + '" data-quality-dim="' + escapeAttr(m.quality_dimension || "") + '" onchange="onJudgementChange(this)">' +
            '<option value="">—</option>' +
            '<option value="agree">Agree</option>' +
            '<option value="disagree">Disagree</option>' +
          '</select></td>' +
          '</tr>';
        if (c.explanation) {
          detailHtml += '<tr><td colspan="7" class="detail-explanation"><span class="detail-rationale-label">Rationale:</span> ' + escapeHtml(c.explanation) + '</td></tr>';
        }
      });
      detailHtml += '</tbody></table></td>';
      detailTr.innerHTML = detailHtml;
      tbody.appendChild(detailTr);
    }
  });
  const overallPct = totalCases > 0 ? Math.round(totalPassed / totalCases * 100) : 0;
  document.getElementById("metrics-status-count").textContent = totalPassed + '/' + totalCases + ' cases passed (' + overallPct + '% overall)';
}

function toggleDetail(rowId, clickedRow) {
  const detailRow = document.getElementById(rowId);
  if (!detailRow) return;
  detailRow.classList.toggle("visible");
  clickedRow.classList.toggle("expanded");
}

// Human judgement tracking
let humanDisagrees = {};

function onJudgementChange(select) {
  const key = select.dataset.caseKey;
  select.classList.remove("agree", "disagree");
  if (select.value) select.classList.add(select.value);

  if (select.value === "disagree") {
    humanDisagrees[key] = {
      criterion_statement: select.dataset.criterionStatement,
      quadrant: select.dataset.quadrant,
      quality_dimension: select.dataset.qualityDim,
      question: select.dataset.question,
      expected: select.dataset.expected,
      actual: select.dataset.actual,
    };
  } else {
    delete humanDisagrees[key];
  }

  const d = EMBEDDED_DATA.data;
  renderFailures((d.failures || []).map(normalizeFailure));
  // Set human_disagrees BEFORE scheduleSave so the saved snapshot includes it.
  // Reverse order would save first (without disagrees) then write to a stale
  // edits object that gets overwritten on the next collectEdits() call.
  edits["human_disagrees"] = JSON.stringify(humanDisagrees);
  scheduleSave();
}

function escapeAttr(text) {
  return (text || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/'/g, "&#39;");
}

function renderFailures(failures) {
  const tbody = document.getElementById("failure-tbody");
  tbody.innerHTML = "";

  const disagreeQuestions = new Set(Object.values(humanDisagrees).map(d => d.question));

  const disagreeEntries = Object.entries(humanDisagrees).map(([key, d]) => ({
    quadrant: d.quadrant,
    criterion_statement: d.criterion_statement,
    quality_dimension: d.quality_dimension,
    question: d.question,
    expected: d.expected,
    actual: d.actual,
    root_cause: "eval_setup",
    _from_disagree: true,
  }));

  const filteredFailures = failures.filter(f => !disagreeQuestions.has(f.question));
  const allFailures = [...filteredFailures, ...disagreeEntries];
  const totalCount = allFailures.length;
  const disagreeCount = disagreeEntries.length;

  let countText = totalCount + " failure" + (totalCount !== 1 ? "s" : "");
  if (disagreeCount > 0) countText += " (" + disagreeCount + " from human review)";
  document.getElementById("failure-count").textContent = countText;

  if (allFailures.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-sm text-muted" style="text-align:center;padding:1rem;">No failures — all test cases passed.</td></tr>';
    return;
  }

  allFailures.forEach((f, i) => {
    const fp = f._from_disagree ? "disagree_" + i : "failures[" + i + "]";
    const q = f.quadrant || "valuable";
    const tr = document.createElement("tr");
    if (f._from_disagree) tr.style.background = "var(--yellow-bg)";

    const rootCauseHtml = f._from_disagree
      ? '<span class="badge badge-yellow" style="font-size:0.72rem;">Eval Setup — Human Disagrees</span>'
      : '<select class="inline-select" data-field="' + fp + '.root_cause" data-original="' + (f.root_cause || "") + '" onchange="scheduleSave()">' +
          ROOT_CAUSES.map(rc =>
            '<option value="' + rc + '"' + (rc === f.root_cause ? ' selected' : '') + '>' + ROOT_CAUSE_LABELS[rc] + '</option>'
          ).join("") +
        '</select>';

    tr.innerHTML =
      '<td><span class="q-badge-sm ' + (Q_BADGE_CSS[q] || "") + '">' + (QUADRANT_LABELS[q] || "") + '</span></td>' +
      '<td class="text-sm"><div style="font-weight:500;">' + escapeHtml(f.criterion_statement || "") + '</div><div class="failure-sub">' + escapeHtml(f.quality_dimension || "") + '</div></td>' +
      '<td class="text-sm">' + escapeHtml(f.question || "") + '</td>' +
      '<td class="text-sm">' + escapeHtml(truncate(f.expected || "", 120)) + '</td>' +
      '<td class="text-sm">' + escapeHtml(truncate(f.actual || "", 120)) + '</td>' +
      '<td>' + rootCauseHtml + '</td>';
    tbody.appendChild(tr);
  });
}

function renderActions(actions) {
  const container = document.getElementById("actions-list");
  if (actions.length === 0) {
    container.innerHTML = '<div class="text-muted text-sm">No actions recommended.</div>';
    return;
  }
  container.innerHTML = actions.map((a, i) =>
    '<div style="margin-bottom:0.8rem;padding:0.6rem;background:var(--bg);border-radius:var(--radius);">' +
    '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">' +
    '<span class="badge badge-green">' + (i + 1) + '</span>' +
    '<strong class="text-sm">Change:</strong> <span class="text-sm">' + escapeHtml(a.change || "") + '</span>' +
    '</div>' +
    '<div class="text-sm" style="margin-left:1.8rem;">' +
    '<strong>Re-run:</strong> ' + escapeHtml(a.rerun || "") +
    ' &rarr; <strong>Expect:</strong> ' + escapeHtml(a.expect || "") +
    '</div>' +
    '</div>'
  ).join("");
}

function renderPatterns(patterns) {
  const container = document.getElementById("patterns-list");
  if (patterns.length === 0) {
    container.innerHTML = '<div class="text-muted text-sm">No patterns detected.</div>';
    return;
  }
  container.innerHTML = '<ul style="margin:0;padding-left:1.2rem;">' +
    patterns.map(p => '<li class="text-sm" style="margin-bottom:0.3rem;">' + escapeHtml(p) + '</li>').join("") +
    '</ul>';
}

function truncate(text, max) {
  return text.length > max ? text.substring(0, max) + "..." : text;
}

function stageCollectEdits() {
  const result = {};
  document.querySelectorAll("[data-field]").forEach(el => {
    if (el.value !== (el.dataset.original || "")) {
      result[el.dataset.field] = el.value;
    }
  });
  // Preserve edits set programmatically (e.g., human_disagrees populated in
  // onJudgementChange). Without this merge, the next collectEdits() call
  // overwrites those keys with a fresh object that has only [data-field]
  // divergences — silently losing Agree/Disagree decisions before submit.
  Object.assign(result, edits);
  return result;
}
</script>
